name: Build e Push OCIR

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Docker CLI
        run: |
          apt-get update
          apt-get install -y docker.io

      - name: Login no OCIR
        run: |
          echo "${{ secrets.OCIR_AUTH_TOKEN }}" | \
          docker login vcp.ocir.io \
            -u "${{ secrets.OCIR_NAMESPACE }}/${{ secrets.OCIR_USERNAME }}" \
            --password-stdin

      - name: Definir versão
        run: |
          echo "IMAGE_TAG=$(echo '${{ gitea.sha }}' | cut -c1-8)" >> "$GITHUB_ENV"

      - name: Build da imagem
        run: |
          docker build \
            -t vcp.ocir.io/${{ secrets.OCIR_NAMESPACE }}/site-staliszeduardo.com.br:${{ env.IMAGE_TAG }} \
            -t vcp.ocir.io/${{ secrets.OCIR_NAMESPACE }}/site-staliszeduardo.com.br:latest \
            .

      - name: Push da imagem versionada
        run: |
          docker push \
            vcp.ocir.io/${{ secrets.OCIR_NAMESPACE }}/site-staliszeduardo.com.br:${{ env.IMAGE_TAG }}

      - name: Push da imagem latest
        run: |
          docker push \
            vcp.ocir.io/${{ secrets.OCIR_NAMESPACE }}/site-staliszeduardo.com.br:latest

      - name: Resumo
        run: |
          echo "Imagem publicada:"
          echo "vcp.ocir.io/${{ secrets.OCIR_NAMESPACE }}/site-staliszeduardo:${{ env.IMAGE_TAG }}"