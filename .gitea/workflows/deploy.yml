name: Build e Push OCIR

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Docker CLI
        run: |
          apt-get update
          apt-get install -y docker.io

      - name: Login no OCIR
        run: |
          echo "${{ secrets.OCIR_AUTH_TOKEN }}" | \
          docker login vcp.ocir.io \
            -u "${{ secrets.OCIR_NAMESPACE }}/${{ secrets.OCIR_USERNAME }}" \
            --password-stdin

      - name: Definir versão
        run: |
          echo "IMAGE_TAG=$(echo '${{ gitea.sha }}' | cut -c1-8)" >> "$GITHUB_ENV"

      - name: Build da imagem
        run: |
          docker build \
            -t vcp.ocir.io/${{ secrets.OCIR_NAMESPACE }}/site-staliszeduardo.com.br:${{ env.IMAGE_TAG }} \
            -t vcp.ocir.io/${{ secrets.OCIR_NAMESPACE }}/site-staliszeduardo.com.br:latest \
            .

      - name: Push da imagem versionada
        run: |
          docker push \
            vcp.ocir.io/${{ secrets.OCIR_NAMESPACE }}/site-staliszeduardo.com.br:${{ env.IMAGE_TAG }}

      - name: Push da imagem latest
        run: |
          docker push \
            vcp.ocir.io/${{ secrets.OCIR_NAMESPACE }}/site-staliszeduardo.com.br:latest

      - name: Resumo
        run: |
          echo "Imagem publicada:"
          echo "vcp.ocir.io/${{ secrets.OCIR_NAMESPACE }}/site-staliszeduardo.com.br:${{ env.IMAGE_TAG }}"

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "${{ secrets.OCI_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Adicionar hosts conhecidos
        run: |
          mkdir -p ~/.ssh

          ssh-keyscan -T 10 -H "${{ secrets.OCI_APP_01_HOST }}" >> ~/.ssh/known_hosts || true
          ssh-keyscan -T 10 -H "${{ secrets.OCI_APP_02_HOST }}" >> ~/.ssh/known_hosts || true

          chmod 600 ~/.ssh/known_hosts

          echo "Hosts adicionados:"
          wc -l ~/.ssh/known_hosts

      - name: Validar known_hosts
        run: |
          test -s ~/.ssh/known_hosts

      - name: Testar SSH OCI-01
        run: |
          ssh \
            -i ~/.ssh/id_ed25519 \
            "${{ secrets.OCI_DEPLOY_USER }}@${{ secrets.OCI_APP_01_HOST }}" \
            "echo 'Conexão OCI-01 OK'; hostname; whoami"

      - name: Testar SSH OCI-02
        run: |
          ssh \
            -i ~/.ssh/id_ed25519 \
            "${{ secrets.OCI_DEPLOY_USER }}@${{ secrets.OCI_APP_02_HOST }}" \
            "echo 'Conexão OCI-02 OK'; hostname; whoami"

      - name: Deploy OCI-01
        run: |
          ssh \
            -i ~/.ssh/id_ed25519 \
            "${{ secrets.OCI_DEPLOY_USER }}@${{ secrets.OCI_APP_01_HOST }}" \
            "sudo /usr/local/bin/deploy-site '${{ env.IMAGE_TAG }}'"

      - name: Deploy OCI-02
        run: |
          ssh \
            -i ~/.ssh/id_ed25519 \
            "${{ secrets.OCI_DEPLOY_USER }}@${{ secrets.OCI_APP_02_HOST }}" \
            "sudo /usr/local/bin/deploy-site '${{ env.IMAGE_TAG }}'"